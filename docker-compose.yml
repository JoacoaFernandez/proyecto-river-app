version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: river_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: river_user
      POSTGRES_PASSWORD: river_password
      POSTGRES_DB: river_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: river_app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: